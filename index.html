<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Панель ведущего — ЭКСТРА</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #0a0e1a 0%, #1a2332 100%);
    min-height: 100vh;
    padding: 30px;
    color: #c0c8d0;
  }
  .header { text-align: center; margin-bottom: 30px; }
  .title {
    font-family: 'Oswald', sans-serif;
    font-size: 42px;
    background: linear-gradient(180deg, #ffd700 0%, #b8941f 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .subtitle { color: #8a95a3; font-size: 14px; letter-spacing: 2px; margin-top: 8px; }
  .controls {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    padding: 14px 30px;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid;
  }
  .ctrl-btn.start {
    background: linear-gradient(135deg, #52b788 0%, #40916c 100%);
    border-color: #52b788;
    color: #fff;
  }
  .ctrl-btn.stop {
    background: linear-gradient(135deg, #e63946 0%, #c1121f 100%);
    border-color: #e63946;
    color: #fff;
  }
  .ctrl-btn.reset {
    background: transparent;
    border-color: #4a9eff;
    color: #6eb5ff;
  }
  .status-bar {
    text-align: center;
    padding: 15px;
    background: rgba(26, 35, 50, 0.6);
    border-radius: 8px;
    margin-bottom: 25px;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
  }
  .status-bar.active { border-left: 4px solid #52b788; color: #52b788; }
  .status-bar.inactive { border-left: 4px solid #e63946; color: #e63946; }
  .status-bar.loading { border-left: 4px solid #4a9eff; color: #6eb5ff; }
  .players-list { max-width: 700px; margin: 0 auto; }
  .player-row {
    display: grid;
    grid-template-columns: 80px 1fr 150px;
    align-items: center;
    padding: 18px 25px;
    background: rgba(26, 35, 50, 0.6);
    border: 1px solid #4a5568;
    border-radius: 8px;
    margin-bottom: 10px;
  }
  .player-row.first {
    background: linear-gradient(90deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.05));
    border-color: #ffd700;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
  }
  .player-row.second {
    background: linear-gradient(90deg, rgba(192, 192, 192, 0.15), rgba(192, 192, 192, 0.03));
    border-color: #c0c0c0;
  }
  .player-row.third {
    background: linear-gradient(90deg, rgba(205, 127, 50, 0.15), rgba(205, 127, 50, 0.03));
    border-color: #cd7f32;
  }
  .position {
    font-family: 'Oswald', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: #8a95a3;
  }
  .player-row.first .position { color: #ffd700; }
  .player-row.second .position { color: #c0c0c0; }
  .player-row.third .position { color: #cd7f32; }
  .player-name { font-size: 20px; color: #c0c8d0; font-weight: 500; }
  .player-row.first .player-name { color: #ffd700; font-size: 22px; font-weight: 600; }
  .player-time {
    text-align: right;
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    color: #6a7585;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #6a7585;
    font-size: 18px;
  }
  .counter {
    font-family: 'Oswald', sans-serif;
    font-size: 24px;
    color: #ffd700;
    margin-left: 10px;
  }
</style>
</head>
<body>

<div class="header">
  <h1 class="title">⭐ Панель ведущего</h1>
  <p class="subtitle">Раунд ЭКСТРА — порядок нажатий</p>
</div>

<div class="controls">
  <button class="ctrl-btn start" onclick="setActive(true)">▶ Начать приём</button>
  <button class="ctrl-btn stop" onclick="setActive(false)">⏸ Остановить</button>
  <button class="ctrl-btn reset" onclick="resetRound()">🔄 Сбросить</button>
</div>

<div class="status-bar loading" id="statusBar">
  Статус: <span id="statusText">подключение...</span>
  <span class="counter" id="counter"></span>
</div>

<div class="players-list" id="playersList">
  <div class="empty-state">Ожидание нажатий...</div>
</div>

<script>
const BIN_ID = '6a36ad5ef5f4af5e2914a4d3';
const MASTER_KEY = '$2a$10$6R2dE.M6lkeTUg2STMamfeoNXfb8RNdGXEUVV0eEm9Drin2Nd97.2';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let lastPlayersCount = 0;

loadData();
setInterval(loadData, 800);

async function loadData() {
  try {
    const response = await fetch(`${API_URL}/latest`, {
      headers: { 'X-Master-Key': MASTER_KEY }
    });
    
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const data = await response.json();
    const bin = data.record;
    
    if (!Array.isArray(bin.players)) bin.players = [];
    if (typeof bin.active !== 'boolean') bin.active = true;
    
    const statusBar = document.getElementById('statusBar');
    const statusText = document.getElementById('statusText');
    const counter = document.getElementById('counter');
    
    if (bin.active) {
      statusBar.className = 'status-bar active';
      statusText.textContent = '🟢 ПРИЁМ ОТВЕТОВ ОТКРЫТ';
    } else {
      statusBar.className = 'status-bar inactive';
      statusText.textContent = '🔴 ПРИЁМ ЗАКРЫТ';
    }
    
    counter.textContent = `Нажали: ${bin.players.length}`;
    renderPlayers(bin.players);
    
  } catch (e) {
    const statusBar = document.getElementById('statusBar');
    const statusText = document.getElementById('statusText');
    if (statusBar && statusText) {
      statusBar.className = 'status-bar inactive';
      statusText.textContent = '⚠️ Ошибка подключения';
    }
  }
}

function renderPlayers(players) {
  const list = document.getElementById('playersList');
  if (!list) return;
  
  if (players.length === 0) {
    list.innerHTML = '<div class="empty-state">Ожидание нажатий...</div>';
    lastPlayersCount = 0;
    return;
  }
  
  const sorted = [...players].sort((a, b) => a.time - b.time);
  
  if (sorted.length !== lastPlayersCount) {
    list.innerHTML = sorted.map((p, i) => {
      let rowClass = '';
      if (i === 0) rowClass = 'first';
      else if (i === 1) rowClass = 'second';
      else if (i === 2) rowClass = 'third';
      
      const time = new Date(p.time);
      const timeStr = time.toLocaleTimeString('ru-RU', { 
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
      
      return `
        <div class="player-row ${rowClass}">
          <div class="position">#${i + 1}</div>
          <div class="player-name">${i === 0 ? '🏆 ' : ''}${p.name}</div>
          <div class="player-time">${timeStr}</div>
        </div>
      `;
    }).join('');
    
    lastPlayersCount = sorted.length;
  }
}

async function setActive(active) {
  try {
    const response = await fetch(`${API_URL}/latest`, {
      headers: { 'X-Master-Key': MASTER_KEY }
    });
    const data = await response.json();
    const bin = data.record;
    
    bin.active = active;
    if (!Array.isArray(bin.players)) bin.players = [];
    
    await fetch(API_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': MASTER_KEY
      },
      body: JSON.stringify(bin)
    });
    
    loadData();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

async function resetRound() {
  if (!confirm('Сбросить все нажатия?')) return;
  
  try {
    await fetch(API_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': MASTER_KEY
      },
      body: JSON.stringify({
        players: [],
        active: true
      })
    });
    
    lastPlayersCount = 0;
    loadData();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}
</script>

</body>
</html>
